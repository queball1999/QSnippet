id: "notice-2026-03-03"
title: "March 3, 2026"
message: |
  Announcing initial Linux support! QSnippet is now available on Debian-based distributions, alongside a number of fixes and infrastructure improvements.

  **Linux Compatibility**
    - QSnippet now runs on Linux. Verified on Debian-based distributions.
    - A `.deb` package is provided for easy installation via `apt`.
    - Added system dependency check on startup to warn about missing requirements.
    - Linux keyboard input is now handled via `evdev`.
    - Fixed clipboard integration on Linux.
    - Fixed missing tray icon in the Linux system tray.
    - Added autostart support on Linux through `LinuxUtils`.

  **Fixes**
    - Fixed images directory path resolution across platforms ([issue #23](https://github.com/queball1999/QSnippet/issues/23)).
    - Refactored IntelliSense popup population into its own method to resolve stale or missing completions ([issue #24](https://github.com/queball1999/QSnippet/issues/24)).

  **CI/CD**
    - Added a Linux build pipeline.
    - Added a build manager workflow that runs the full test suite before dispatching platform builds.

  **Developer**
    - Refactored codebase to use Google-style docstrings throughout.
    - Added a database benchmark test.
