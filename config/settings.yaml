# Default Settings Configuration
general:
  startup_behavior:
    start_at_boot:
      type: bool
      value: true
      default: true
      description: Launch the application automatically when the system starts.

    show_ui_at_start:
      type: bool
      value: true
      default: true
      description: Display the user interface when the application starts.

  extra_features:
    easter_eggs_enabled:
      type: bool
      value: true
      default: true
      description: Enable or disable easter eggs within the application.

  table_behavior:
    expand_folders_on_load:
      type: bool
      value: false
      default: false
      description: Expand all folder views when loading the application.

    expand_on_search:
      type: bool
      value: true
      default: true
      description: Automatically expand all folder views when a search is performed.

  clipboard_behavior:
    clipboard_timeout:
      type: string
      value: "30"
      default: "30"
      options:
        - "15"
        - "30"
        - "60"
        - "120"
        - "off"
      description: Clear snippet clipboard contents after the specified number of seconds.

notices:
  disable_notices:
    type: bool
    value: false
    default: false
    description: Disable all in-app notices and notifications.
  dismissed_notices:
    type: list
    value: []
    default: []
    hidden: true
    description: List of notices that have been dismissed by the user.

saving:
  navigate_home_after_save:
    type: bool
    value: true
    default: true
    description: Return to the home view after saving. If unchecked, remain on the current page.
