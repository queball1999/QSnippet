name: Build and Release For Linux

on:
  push:
    tags:
      - "v*.*.*-linux"
  workflow_call:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install system dependencies for PySide6
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-util1 \
            libxcb-xkb1 \
            libxcb-shape0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            xclip \
            xvfb

      - name: Read version
        id: version
        run: |
          VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('config/config.yaml'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Linux binary (PyInstaller)
        run: xvfb-run -a bash ./tools/build.sh

      - name: Package .deb
        run: bash ./tools/package-deb.sh

      - name: Install .deb (smoke test)
        run: |
          DEB="output/linux/QSnippet_${{ steps.version.outputs.version }}_amd64.deb"
          sudo apt purge qsnippet -y || true
          cp "$DEB" /tmp/QSnippet_${{ steps.version.outputs.version }}_amd64.deb
          sudo apt install /tmp/QSnippet_${{ steps.version.outputs.version }}_amd64.deb -y

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-build
          path: output/linux/QSnippet_*_amd64.deb
