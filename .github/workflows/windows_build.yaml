name: Build and Release For Windows

on:
  push:
    tags:
      - "v*.*.*-windows"
  workflow_call:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Load version info
        run: python tools/versioning.py
        # Sets env.APP_VERSION for later steps

      - name: Build Windows binaries (PyInstaller)
        run: tools/build.ps1
        shell: powershell

      - name: Update Inno Setup version
        run: |
          $issContent = Get-Content "QSnippet.iss" -Raw
          $issContent = $issContent -replace '#define MyAppVersion ".*"', '#define MyAppVersion "${{ env.APP_VERSION }}"'
          Set-Content "QSnippet.iss" $issContent -NoNewline
        shell: powershell

      - name: Build Windows installer (Inno Setup)
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: QSnippet.iss
          options: /O+

      - name: Upload Windows executables
        uses: actions/upload-artifact@v6
        with:
          name: windows-build
          path: |
            output/windows/QSnippet-*-windows-installer.exe
            output/windows/QSnippet-*-windows-portable.zip

  release:
    runs-on: ubuntu-latest
    needs: build-windows
    # Skip release when called from build_manager, it handles the unified release
    if: github.event_name != 'workflow_call'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 --decode > private.asc
          gpg --batch --import private.asc
          echo "trust-model always" >> ~/.gnupg/gpg.conf
          gpg --list-secret-keys --keyid-format=long

      - name: Generate checksums
        run: |
          cd dist
          find . -type f \( -name "*.exe" -o -name "*.zip" \) -print0 | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Sign artifacts
        run: |
          cd dist
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --detach-sign SHA256SUMS.txt

          find . -type f \( -name "*.exe" -o -name "*.zip" \) -print0 | while IFS= read -r -d '' file; do
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
                --detach-sign "$file"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: QSnippet ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/**/*.exe
            dist/**/*.zip
            dist/**/*.sig
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
