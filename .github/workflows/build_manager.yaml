name: Build Manager

# Tag convention:
#   v*.*.*-release  →  full pipeline (pytest → linux + windows → unified release)
#   v*.*.*-linux    →  linux standalone build only
#   v*.*.*-windows  →  windows standalone build only

on:
  push:
    tags:
      - "v*.*.*-release"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest

  build-linux:
    needs: test
    uses: ./.github/workflows/linux_build.yaml
    secrets: inherit

  build-windows:
    needs: test
    uses: ./.github/workflows/windows_build.yaml
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 --decode > private.asc
          gpg --batch --import private.asc
          echo "trust-model always" >> ~/.gnupg/gpg.conf
          gpg --list-secret-keys --keyid-format=long

      - name: Generate checksums
        run: |
          cd dist
          find . -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.deb" \) -print0 | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Sign artifacts
        run: |
          cd dist
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --detach-sign SHA256SUMS.txt

          find . -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.deb" \) -print0 | while IFS= read -r -d '' file; do
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
                --detach-sign "$file"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: QSnippet ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/**/*.exe
            dist/**/*.zip
            dist/**/*.deb
            dist/**/*.sig
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
